<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Library</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tienne:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <section class="hero">
        <div class="hero__content">
            <span class="eyebrow">My Personal Library</span>
            <h1>A quiet place for the books I love most.</h1>
            <p>
                A simple space to keep track of favorite stories, current reads, and the books I want close by.
            </p>

            <div class="hero__actions">
                <a href="#library" class="btn btn--primary">View My Books</a>
            </div>
            <a href="YOUR_GITHUB_REPO_URL" class="github-link" target="_blank" rel="noopener noreferrer">
                <img src="github-outline-fill.svg" alt="" class="github-link__icon">
                <span>View on GitHub</span>
            </a>
        </div>
        <div>
            <img class="hero-img hero__image" src="behold.png" alt="Purple beholder painted by a talented artist" />
        </div>
    </section>

    <section class="current-section" id="library">
        <div class="section-heading">
            <h2>My Books</h2>
            <p>A small collection of personal favorites and current reads.</p>
        </div>

        <div class="library-actions">
            <button id="btn1" class="btn btn--primary">Add Book</button>
            <button id="btn2" class="btn btn--primary">Clean Library</button>
        </div>

        <div class="current-grid" id="card-grid-section">

        </div>
    </section>
    <dialog id="book-dialog" class="book-dialog">
        <form id="book-form" class="book-form">
            <h3>Add a New Book</h3>

            <label for="title">Title</label>
            <input type="text" id="title" name="title" placeholder="Book title">

            <label for="author">Author</label>
            <input type="text" id="author" name="author" placeholder="Author name">

            <label for="genre">Genre</label>
            <input type="text" id="genre" name="genre" placeholder="Genre">

            <label for="pages">Pages</label>
            <input type="number" id="pages" name="pages" placeholder="Pages" min="0">

            <label for="status">Status</label>
            <select id="status" name="status">
                <option value="To Read">To Read</option>
                <option value="Reading">Reading</option>
                <option value="Finished">Finished</option>
            </select>

            <div class="dialog-actions">
                <button type="submit" class="btn btn--primary">Save Book</button>
                <button type="button" id="close-dialog" class="btn btn--primary">Cancel</button>
            </div>
        </form>
    </dialog>
    <script src="script.js"></script>
</body>

</html>
